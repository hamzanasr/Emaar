name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Build Web Portal Only ─────────────────────────────────
  build:
    name: Build Web Portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (legacy peer deps)
        run: npm install --legacy-peer-deps

      - name: Build web-portal
        run: cd apps/web-portal && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.enjazmedia.com
